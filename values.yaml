gitlabUrl: https://gitlab.com/
runnerRegistrationToken: SEU_TOKEN_AQUI  # ← Substitua pelo placeholder

rbac:
  create: true

serviceAccount:
  create: true
  name: gitlab-runner

runners:
  privileged: true
  image: alpine
  namespace: default
  tags: minikube
  config: |
    [[runners]]
      name = "docker-runner"
      url = "https://gitlab.com/"
      token = "SEU_TOKEN_AQUI"  # ← Substitua pelo placeholder
      executor = "docker"
      [runners.docker]
        image = "alpine"
        privileged = true
        volumes = ["/cache", "/var/run/docker.sock:/var/run/docker.sock"]