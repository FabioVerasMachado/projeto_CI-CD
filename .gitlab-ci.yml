stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: veras71/meusite-devops
  DOCKER_TAG: $CI_COMMIT_SHORT_SHA

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "📦 Construindo a imagem Docker..."
    - docker build -t $DOCKER_IMAGE:$DOCKER_TAG .
    - docker tag $DOCKER_IMAGE:$DOCKER_TAG $DOCKER_IMAGE:latest
    - echo "📤 Enviando para o Docker Hub..."
    - docker login -u veras71 -p $DOCKER_PASSWORD
    - docker push $DOCKER_IMAGE:$DOCKER_TAG
    - docker push $DOCKER_IMAGE:latest
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG" > ~/.kube/config
  script:
    - echo "🚀 Deployando no Kubernetes..."
    - kubectl set image deployment/meusite-devops meusite-devops=$DOCKER_IMAGE:$DOCKER_TAG
    - kubectl rollout status deployment/meusite-devops
    - echo "✅ Deploy concluído!"
  only:
    - main