apiVersion: apps/v1
kind: Deployment
metadata:
  name: meusite-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meusite-devops
  template:
    metadata:
      labels:
        app: meusite-devops
    spec:
      containers:
      - name: meusite-devops
        image: veras71/meusite-devops:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5