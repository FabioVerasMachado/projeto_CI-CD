apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: meusite-devops-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: meusite-devops
  minReplicas: 2          # Número mínimo de pods
  maxReplicas: 10         # Número máximo de pods
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Escala se o uso médio de CPU passar de 70%